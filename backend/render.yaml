services:
  - type: web
    name: otto-whisper-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # preencher manualmente no painel do Render
      - key: EXTRA_ALLOWED_ORIGINS
        value: ""
    healthCheckPath: /health
    autoDeploy: true
