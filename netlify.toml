[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: todas as rotas redirecionam para index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers CSP para embed no OTTO PWA
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOW-FROM https://ottopwa.vercel.app"
    Content-Security-Policy = "frame-ancestors 'self' https://otto.drdariohart.com https://ottopwa.vercel.app"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
